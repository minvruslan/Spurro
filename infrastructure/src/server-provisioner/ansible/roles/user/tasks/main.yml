- name: Create system user {{ service_username }}
  ansible.builtin.user:
    name: "{{ service_username }}"
    system: true
    create_home: true
    shell: /bin/bash
    password: "*"

- name: Add {{ service_username }} to docker group
  ansible.builtin.user:
    name: "{{ service_username }}"
    groups: docker
    append: true

- name: Create base directory {{ service_base_directory }} owned by {{ service_username }}
  ansible.builtin.file:
    path: "{{ service_base_directory }}"
    state: directory
    owner: "{{ service_username }}"
    group: "{{ service_username }}"
    mode: "0750"

- name: Grant passwordless sudo to {{ service_username }}
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ service_username }}
    content: "{{ service_username }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
